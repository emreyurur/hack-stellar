name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Smart contract tests ───────────────────────────────────────────────────
  contract-tests:
    name: Smart Contract Tests (Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/counter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts/counter

      - name: Run counter contract tests
        run: cargo test -p hello-world --lib -- --nocapture

      - name: Run pool-router contract tests
        run: cargo test -p pool-router --lib -- --nocapture

  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build
